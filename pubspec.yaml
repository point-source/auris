name: auris
description: >-
  A Flutter UI kit and Material 3 theme with a warm amber-on-near-black,
  chamfered sci-fi aesthetic — a drop-in ThemeData plus a library of custom
  HUD widgets.
version: 0.2.0
repository: https://github.com/point-source/auris
homepage: https://github.com/point-source/auris

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  golden_matrix: 1.1.1

flutter:
  fonts:
    - family: Rajdhani
      fonts:
        - asset: fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: ExoTwo
      fonts:
        - asset: fonts/Exo2-Regular.ttf
    - family: ShareTechMono
      fonts:
        - asset: fonts/ShareTechMono-Regular.ttf
